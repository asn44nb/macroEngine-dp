title: "[Feature Request]"
body:
  - type: textarea
    id: feature_summary
    attributes:
      label: Feature Summary
      description: Provide a short summary of the requested feature.
      placeholder: "One sentence description of the feature (new item, GUI option, macro, etc.)"
  - type: textarea
    id: feature_details
    attributes:
      label: Feature Details
      description: Explain in detail how the feature should work in the datapack.
      placeholder: "Include commands, behavior, or interaction examples."
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature for your use case?
      options:
        - Low
        - Medium
        - High
